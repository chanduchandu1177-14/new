<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feed | PawSnap</title>
    <link rel="stylesheet" href="feed.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="feed-page">

    <header class="feed-nav">
        <div class="nav-container">
            <a href="index.html" class="logo">Paw<span>Snap</span></a>
            
            <div class="nav-actions">
                <button class="btn-add-story" aria-label="Add new story">
                    <span class="icon">+</span>
                    <span class="btn-text">Add Story</span>
                </button>
                <div class="user-avatar-mini">
                    <img src="https://via.placeholder.com/40" alt="Your Profile">
                </div>
            </div>
        </div>
    </header>

    <main class="feed-container">
        <section class="story-grid" id="story-feed">
            
            <article class="story-card">
                <div class="story-image-wrapper">
                    <img src="https://images.unsplash.com/photo-1517849845537-4d257902454a?auto=format&fit=crop&q=80&w=800" alt="Golden Retriever puppy" class="story-img">
                    <div class="countdown-badge">
                        <span class="timer-icon">🕒</span> 17h left
                    </div>
                </div>
                
                <div class="story-content">
                    <div class="story-header">
                        <div class="pet-info">
                            <h2 class="pet-name">Cooper</h2>
                            <span class="owner-handle">@goldie_gang</span>
                        </div>
                        <button class="btn-like" aria-label="Like story">🐾</button>
                    </div>
                    <p class="story-caption">Finally caught the red dot! Victory is mine. 🐶✨</p>
                </div>
            </article>

            <article class="story-card">
                <div class="story-image-wrapper">
                    <img src="https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?auto=format&fit=crop&q=80&w=800" alt="Black cat sleeping" class="story-img">
                    <div class="countdown-badge warning">
                        <span class="timer-icon">🕒</span> 2h left
                    </div>
                </div>
                
                <div class="story-content">
                    <div class="story-header">
                        <div class="pet-info">
                            <h2 class="pet-name">Luna</h2>
                            <span class="owner-handle">@void_cat_mom</span>
                        </div>
                        <button class="btn-like" aria-label="Like story">🐾</button>
                    </div>
                    <p class="story-caption">18 hours of sleep today. New record. 🐈‍⬛💤</p>
                </div>
            </article>

            <article class="story-card">
                <div class="story-image-wrapper">
                    <img src="https://images.unsplash.com/photo-1583337130417-3346a1be7dee?auto=format&fit=crop&q=80&w=800" alt="Rabbit eating greens" class="story-img">
                    <div class="countdown-badge">
                        <span class="timer-icon">🕒</span> 23h left
                    </div>
                </div>
                
                <div class="story-content">
                    <div class="story-header">
                        <div class="pet-info">
                            <h2 class="pet-name">Barnaby</h2>
                            <span class="owner-handle">@bunny_hop</span>
                        </div>
                        <button class="btn-like" aria-label="Like story">🐾</button>
                    </div>
                    <p class="story-caption">The cilantro has been secured. Do not approach. 🐰🥬</p>
                </div>
            </article>

        </section>

        <div class="feed-loader" hidden>
            <div class="spinner"></div>
            <p>Fetching more paws...</p>
        </div>
    </main>

    <nav class="mobile-nav">
        <a href="#" class="nav-item active">🏠</a>
        <a href="#" class="nav-item">🔍</a>
        <a href="#" class="nav-item-add">+</a>
        <a href="#" class="nav-item">🔔</a>
        <a href="#" class="nav-item">👤</a>
    </nav>

</body>
</html>
