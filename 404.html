<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | PawSnap</title>
    <link rel="stylesheet" href="404.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body class="error-page">

    <main class="error-container">
        <header class="error-header">
            <a href="index.html" class="logo">Paw<span>Snap</span></a>
        </header>

        <section class="error-content">
            <div class="illustration">
                <span class="emoji">🔍</span>
                <div class="glow-effect"></div>
            </div>
            
            <h1 class="error-title">Oops! Page Not Found</h1>
            <p class="error-message">
                It looks like this page has vanished—just like a 24-hour story. 
                Even the best trackers can't find it.
            </p>

            <div class="error-actions">
                <a href="index.html" class="btn-home">Back to Homepage</a>
                <a href="feed.html" class="btn-secondary">View Feed</a>
            </div>
        </section>

        <footer class="error-footer">
            <p class="error-code">Error Code: 404</p>
        </div>
    </main>

</body>
</html>
