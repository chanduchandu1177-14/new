<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | PawSnap</title>
    <link rel="stylesheet" href="login.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="login-wrapper">
        <header class="logo-container">
            <a href="index.html" class="logo">Paw<span>Snap</span></a>
        </header>

        <main class="login-card">
            <div class="card-header">
                <h1>Welcome Back</h1>
                <p>Check in on your pet's daily circle.</p>
            </div>

            <form class="login-form" action="#" method="POST">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required autofocus>
                </div>

                <div class="form-group">
                    <div class="label-row">
                        <label for="password">Password</label>
                        <a href="#" class="forgot-link">Forgot?</a>
                    </div>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-login">Login to PawSnap</button>
            </form>

            <footer class="card-footer">
                <p>Don't have an account? <a href="signup.html">Join the pack</a></p>
            </footer>
        </main>
    </div>

</body>
</html>
