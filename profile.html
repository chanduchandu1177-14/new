<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buddy's Profile | PawSnap</title>
    <link rel="stylesheet" href="profile.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="profile-page">

    <header class="main-nav">
        <div class="container">
            <a href="feed.html" class="back-link">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                Back to Feed
            </a>
            <div class="nav-right">
                <button class="settings-btn" aria-label="Settings">⚙️</button>
            </div>
        </div>
    </header>

    <main class="profile-container">
        
        <section class="profile-header">
            <div class="profile-avatar-wrapper">
                <img src="https://images.unsplash.com/photo-1543466835-00a7907e9de1?auto=format&fit=crop&q=80&w=300" alt="Pet Avatar" class="profile-avatar">
                <div class="status-indicator online"></div>
            </div>

            <div class="profile-info">
                <div class="name-row">
                    <h1 class="pet-name">Buddy</h1>
                    <span class="pet-type-tag">Golden Retriever</span>
                </div>
                <p class="owner-username">@max_adventures</p>
                <p class="profile-bio">Just a good boy living his best life one tennis ball at a time. 🎾</p>
                
                <div class="profile-stats">
                    <div class="stat-item"><strong>128</strong> Stories</div>
                    <div class="stat-item"><strong>1.2k</strong> Pack Members</div>
                </div>

                <div class="profile-actions">
                    <button class="btn-primary">Edit Profile</button>
                    <button class="btn-share" aria-label="Share profile">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path><polyline points="16 6 12 2 8 6"></polyline><line x1="12" y1="2" x2="12" y2="15"></line></svg>
                    </button>
                </div>
            </div>
        </section>

        <hr class="section-divider">

        <section class="active-stories">
            <div class="section-header">
                <h2>Active Stories</h2>
                <span class="story-count">3 currently live</span>
            </div>

            <div class="stories-grid">
                <div class="story-thumbnail">
                    <img src="https://images.unsplash.com/photo-1552053831-71594a27632d?auto=format&fit=crop&q=80&w=400" alt="Active story">
                    <div class="time-overlay">4h left</div>
                </div>

                <div class="story-thumbnail">
                    <img src="https://images.unsplash.com/photo-1537151608828-ea2b11777ee8?auto=format&fit=crop&q=80&w=400" alt="Active story">
                    <div class="time-overlay warning">52m left</div>
                </div>

                <div class="story-thumbnail">
                    <img src="https://images.unsplash.com/photo-1583511655857-d19b40a7a54e?auto=format&fit=crop&q=80&w=400" alt="Active story">
                    <div class="time-overlay">21h left</div>
                </div>

                <a href="create-story.html" class="add-story-slot">
                    <div class="plus-icon">+</div>
                    <span>Add New</span>
                </a>
            </div>
        </section>

    </main>

    <nav class="bottom-nav">
        <a href="feed.html" class="nav-icon">🏠</a>
        <a href="#" class="nav-icon">🔍</a>
        <a href="profile.html" class="nav-icon active">👤</a>
    </nav>

</body>
</html>
