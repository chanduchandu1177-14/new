<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Settings | PawSnap</title>
    <link rel="stylesheet" href="settings.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="settings-page">

    <header class="settings-nav">
        <div class="container">
            <a href="profile.html" class="back-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                <span>Settings</span>
            </a>
            <button type="submit" form="settings-form" class="save-btn-top">Save</button>
        </div>
    </header>

    <main class="settings-container">
        <form id="settings-form" class="settings-form" action="#" method="POST">
            
            <section class="settings-card">
                <h2 class="section-title">Public Profile</h2>
                
                <div class="form-group">
                    <label for="username">Owner Username</label>
                    <input type="text" id="username" name="username" value="max_adventures" required>
                    <p class="field-help">This is how other pack members find you.</p>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="pet-name">Pet Name</label>
                        <input type="text" id="pet-name" name="pet-name" value="Buddy" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="pet-type">Pet Type</label>
                        <select id="pet-type" name="pet-type">
                            <option value="dog" selected>Dog</option>
                            <option value="cat">Cat</option>
                            <option value="bird">Bird</option>
                            <option value="rabbit">Rabbit</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                </div>
            </section>

            <section class="settings-card">
                <h2 class="section-title">Security</h2>
                
                <div class="form-group">
                    <label for="current-password">Current Password</label>
                    <input type="password" id="current-password" name="current-password" placeholder="••••••••">
                </div>

                <div class="form-group">
                    <label for="new-password">New Password</label>
                    <input type="password" id="new-password" name="new-password" placeholder="Min. 8 characters">
                </div>
            </section>

            <section class="settings-card danger-zone">
                <h2 class="section-title">Account Actions</h2>
                <div class="action-row">
                    <div class="action-text">
                        <h3>Private Profile</h3>
                        <p>Only your followers can see your pet's stories.</p>
                    </div>
                    <label class="switch">
                        <input type="checkbox">
                        <span class="slider"></span>
                    </label>
                </div>
                
                <button type="button" class="btn-logout">Log Out</button>
            </section>

            <footer class="settings-footer">
                <button type="submit" class="btn-save-main">Update Settings</button>
            </footer>

        </form>
    </main>

</body>
</html>
