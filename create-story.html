<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Story | PawSnap</title>
    <link rel="stylesheet" href="create-story.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="create-page">

    <header class="create-header">
        <div class="container">
            <a href="feed.html" class="btn-back" aria-label="Go back">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            </a>
            <h1>New Story</h1>
            <div class="spacer"></div> </div>
    </header>

    <main class="create-container">
        <form id="story-form" class="story-form">
            
            <section class="upload-section">
                <label for="file-upload" class="drop-zone" id="drop-zone">
                    <input type="file" id="file-upload" accept="image/*,video/*" hidden>
                    
                    <div class="upload-placeholder" id="upload-placeholder">
                        <div class="upload-icon">📸</div>
                        <p class="primary-text">Tap to upload or drag & drop</p>
                        <p class="secondary-text">Photos or videos (Max 10MB)</p>
                    </div>

                    <div class="preview-container" id="preview-container" hidden>
                        <img src="" alt="Story preview" id="image-preview" class="image-preview">
                        <button type="button" class="btn-remove" id="btn-remove">✕</button>
                    </div>
                </label>
            </section>

            <section class="details-section">
                <div class="input-group">
                    <label for="caption">Caption</label>
                    <textarea 
                        id="caption" 
                        name="caption" 
                        placeholder="What's your pet up to?" 
                        maxlength="150" 
                        rows="4"
                    ></textarea>
                    <div class="char-counter">
                        <span id="current-chars">0</span>/150
                    </div>
                </div>

                <div class="form-actions">
                    <p class="disclaimer">Story will vanish in 24 hours.</p>
                    <button type="submit" class="btn-post" id="post-button" disabled>
                        Post Story
                    </button>
                </div>
            </section>

        </form>
    </main>

    <script>
        const fileInput = document.getElementById('file-upload');
        const dropZone = document.getElementById('drop-zone');
        const previewContainer = document.getElementById('preview-container');
        const placeholder = document.getElementById('upload-placeholder');
        const imgPreview = document.getElementById('image-preview');
        const btnRemove = document.getElementById('btn-remove');
        const caption = document.getElementById('caption');
        const charCounter = document.getElementById('current-chars');
        const postBtn = document.getElementById('post-button');

        // Handle Image Preview
        fileInput.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    imgPreview.src = e.target.result;
                    placeholder.hidden = true;
                    previewContainer.hidden = false;
                    postBtn.disabled = false;
                }
                reader.readAsDataURL(file);
            }
        });

        // Remove Preview
        btnRemove.addEventListener('click', (e) => {
            e.preventDefault();
            fileInput.value = "";
            placeholder.hidden = false;
            previewContainer.hidden = true;
            postBtn.disabled = true;
        });

        // Character Counter
        caption.addEventListener('input', () => {
            charCounter.textContent = caption.value.length;
        });
    </script>

</body>
</html>
